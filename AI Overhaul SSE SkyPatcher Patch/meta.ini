nexusDescription="[left][size=3]I love [url=https://www.nexusmods.com/skyrimspecialedition/mods/21654]AI Overhaul SSE[/url]. It makes the world feel more lively, more lived in. [i]However[/i], it comes at a cost of multiple patches needed between other mods that modifies base and DLC NPCs, mostly being replacers. \n<br />That's where [b][url=https://www.nexusmods.com/skyrimspecialedition/mods/136826]AI Overhaul SSE SPID Patch[/url]﻿[/b] comes into play. It takes advantage of [url=https://www.nexusmods.com/skyrimspecialedition/mods/36869]Spell Item Perk Distribution[/url] mod, applying various packages AI Overhaul SSE adds through SPID instead, absolving many incompatibilities. But there are still incompatibilities. \n<br />\n<br />And then there's me, bored, decided to see what [url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]SkyPatcher[/url] can do to absolve even more incompatibilities. So I looked up at what NPCs can be reduced even more with the use of SkyPatcher, hence, this mod. \n<br />\n<br />This mod, in combination with the aforementioned SPID Patch, manages to reduce a LOT of NPCs that requires patching. That being said, other AI Overhaul SSE patches that's related to town overhauls and the like, you still probably needs them.[/size][size=3]\n<br />[/size][b][size=3][/size]\n<br />[size=3][size=3]==========[size=3]==========[/size][size=3]==========[/size][size=3]==========[/size]=======[/size][/size]\n<br />[size=3]\n<br />Requirements:\n<br />[/size][/b]\n<br />[list]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/266]Unofficial Skyrim Special Edition Patch - USSEP[/url] and other relevant USSEP patches depending on your modlist[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/36869]Spell Perk Item Distributor - SPID[/url] for the SPID Patch. [b]MAKE SURE IT'S THE LATEST EARLY ACCESS VERSION.[/b][/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]SkyPatcher[/url]﻿ for this SkyPatcher Patch[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/21654]AI Overhaul SSE[/url] (Any version is fine, as long as it's note Lite)[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/136826]AI Overhaul SPID Patch[/url][/size]\n<br />[/list][size=3][size=3]\n<br />[/size][/size][b][size=3][size=3]==========[size=3]==========[/size][size=3]==========[/size][size=3]==========[/size]======[/size][/size][b][size=3][size=3]=\n<br />\n<br />[b][size=3]Installation:\n<br />\n<br />[/size][/b][/size][/size][/b][/b][list]\n<br />[*][size=3]Install the required mods. [b]Including AI Overhaul SSE. This mod no longer includes a replacer plugin.[/b][/size]\n<br />[*][size=3]Install this mod.[/size]\n<br />[*][size=3][b]Load AI Overhaul.esp as high as possible, before ANY NPC replacers; NPC replacers need to load AFTER AI Overhaul.esp[/b][/size]\n<br />[*][size=3]The FOMOD will detect if you have [i]AI Overhaul.esp [/i]or not. If said file isn't detected, you won't be able to pick said SkyPatcher file.[/size]\n<br />[*][size=3]Any and all AI Overhaul SSE patches with NPC replacers can be [b]ignored[/b] (such as AI Overhaul SSE Bijin Warmaidens patch), but for other AI Overhaul SSE patches, it's still required.[/size]\n<br />[/list][size=3]\n<br />Here's some AI Overhaul SSE Patches I personally still use:\n<br />[/size][list]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/90393]AI Overhaul SSE - Creation Club Farming - Tweaks and Enhancements Patch[/url]﻿[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/mods/89307]AI Overhaul SSE - Interesting NPCs Patch[/url]﻿[/size]\n<br />[*][size=3]Various AI Overhaul SSE - Town, City Overhaul patches (JK's Skyrim, Cities of the North, etc.)[/size]\n<br />[*][size=3]And more AI Overhaul SSE-related patches you can find [url=https://www.nexusmods.com/skyrimspecialedition/mods/87016]here[/url]﻿[/size]\n<br />[/list]\n<br />[b][size=3][size=3]==========[size=3]==========[/size][size=3]==========[/size][size=3]==========[/size]======[/size][/size][b][size=3][size=3]=[/size][/size][/b][/b][b][b][size=3][size=3][/size][/size][/b]\n<br />[/b][list]\n<br />[/list][size=3]Now, for some elaboration:\n<br />[/size]\n<br />[size=3]AI Overhaul SPID Patch and my SkyPatcher Patch covered these areas:\n<br />\n<br />[/size][list]\n<br />[*][size=3](SPID) SPOR - Spectator Override Package List[/size]\n<br />[*][size=3](SPID) ECOR - Combat Override Package List[/size]\n<br />[*][size=3](SPID) PKID - Package (new Packages; Package removal is done through the Synthesis Patcher instead)[/size]\n<br />[*][size=3](SkyPatcher) Flags (Protected, Essential, Unique)[/size]\n<br />[*][size=3](SkyPatcher) Template Flags (Removal, only for a single NPC from Fishing CC)[/size]\n<br />[*][size=3]﻿(SkyPatcher) SNAM - Faction[/size]\n<br />[*][size=3](SkyPatcher) Item Distribution[b] [/b](Item distributed once if NPC doesn't have it)[/size]\n<br />[*][size=3](SkyPatcher) DNAM - Player Skills (Magicka stat change, Skills stat change)[/size]\n<br />[*][size=3](SkyPatcher) AI Data - Aggression[/size]\n<br />[*][size=3][size=3](SkyPatcher) AI Data - [/size]Confidence[/size]\n<br />[*][size=3][size=3](SkyPatcher) AI Data - [/size]Assistance[/size]\n<br />[*][size=3](SkyPatcher) Spell Distribution[/size]\n<br />[/list]\n<br />[size=3]This essentially covered 300+ NPCs, leaving for 50+ NPCs left that require either manual patching or Synthesis. I recommend the latter. [size=3]I've forked Excinerus' [url=https://github.com/Excinerus/AI-Overhaul-Patcher]AI-Overhaul-Patcher[/url]﻿ with some personal changes, specific for use with this SkyPatcher mod. You can read more about it [url=https://github.com/sincerity21/AI-Overhaul-Patcher]here[/url]﻿. The .synth file will be provided in the main FOMOD installer. Read [url=https://mutagen-modding.github.io/Synthesis/Synth-File/]this[/url]﻿ to learn how to open / launch .synth files.[/size][size=3] Run the Synthesis Patcher once; no need for manual patches (anymore).\n<br />[/size]\n<br />[/size][size=3]Also, on the AI Overhaul [url=https://mutagen-modding.github.io/Synthesis/Patcher-Settings/#embedded-settings-ui]Patcher settings[/url]﻿, I recommend ticking [b]Merge Items[/b] off if you use mods that replaces vanilla distribution with its own distribution (i.e. [url=https://www.nexusmods.com/skyrimspecialedition/mods/71372]Tamrielic Distribution[/url]﻿).[/size][/left]"
